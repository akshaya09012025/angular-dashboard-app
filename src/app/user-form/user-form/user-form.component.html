
<div class="modal-overlay">
  <div class="modal-content">
    <h2>Add New User</h2>

    <form [formGroup]="form" (ngSubmit)="submit()">

      <div class="form-group">
        <label for="name">Name</label>
        <input id="name" type="text" placeholder="Enter name" formControlName="name"/>
        <div *ngIf="name?.touched && name?.invalid" class="error-message">
          <small *ngIf="name?.errors?.['required']">Name is required.</small>
          <small *ngIf="name?.errors?.['minlength']">Name must be at least 3 characters.</small>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input id="email" type="email" placeholder="Enter email" formControlName="email"/>
        <div *ngIf="email?.touched && email?.invalid" class="error-message">
          <small *ngIf="email?.errors?.['required']">Email is required.</small>
          <small *ngIf="email?.errors?.['email']">Enter a valid email.</small>
        </div>
      </div>

      <div class="form-group">
        <label for="role">Role</label>
        <select id="role" formControlName="role">
          <option value="">Select role</option>
          <option>Admin</option>
          <option>Editor</option>
          <option>Viewer</option>
        </select>
        <div *ngIf="role?.touched && role?.invalid" class="error-message">
          <small>Role is required.</small>
        </div>
      </div>

      <div class="submit-error" *ngIf="submitError">
        <small>{{ submitError }}</small>
      </div>

      <div class="buttons">
        <button type="submit">Add</button>
        <button type="button" (click)="cancel()">Cancel</button>
      </div>
    </form>
  </div>
</div>
